<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sino ka ba?</title>
</head>
<body>
    <h1>First of all, si Sam ka ba?</h1>

    <div class="buttons">
        <button class="button--yes" style="font-family: 'Poppins', sans-serif";">
            <div class="left"></div>
            Oo
            <div class="right"></div>
        </button>
        
        
        <button class="button--no" style="font-family: 'Poppins', sans-serif";">
            <div class="left"></div>
            Hindi
            <div class="right"></div>
        </button>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
